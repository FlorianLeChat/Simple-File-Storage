stages:
    - build

build:project:
    stage: build
    image: alpine:3
    rules:
        -   if: $CI_COMMIT_TAG
            when: on_success
        -   if: $CI_COMMIT_BRANCH
            when: manual
    before_script:
        - apk add --no-cache zip
        - mv $ENV_FILE .env
        - echo "" >> .env
        - echo "VERSION=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}" >> .env
    script:
        - zip -r project.zip .env compose.yml
    artifacts:
        paths:
            - .env
            - compose.yml
            - project.zip
        access: none
        expire_in: 1 hour

build:docker:
    stage: build
    image: docker:29
    needs:
        - build:project
    services:
        - docker:29-dind
    variables:
        DOCKER_TLS_CERTDIR: "/certs"
    script:
        - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
        - docker compose pull --ignore-buildable --ignore-pull-failures
        - docker compose build
        - docker compose push