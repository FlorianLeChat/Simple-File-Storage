name: simple-file-storage

services:
    database:
        init: true
        image: mariadb:12
        restart: unless-stopped
        command: --collation-server=utf8mb4_unicode_ci
        volumes:
            - mariadb_data:/var/lib/mysql
        env_file:
            - .env
        environment:
            TZ: ${TZ}
            MARIADB_DATABASE: ${DATABASE_NAME}
            MARIADB_USER: ${DATABASE_USERNAME}
            MARIADB_PASSWORD: ${DATABASE_PASSWORD}
            MARIADB_AUTO_UPGRADE: true
            MARIADB_INITDB_SKIP_TZINFO: true
            MARIADB_RANDOM_ROOT_PASSWORD: true
        security_opt:
            - no-new-privileges=true
        healthcheck:
            test: healthcheck.sh --su-mysql --connect --innodb_initialized
            retries: 3
            timeout: 5s
            start_period: 30s
        deploy:
            resources:
                limits:
                    pids: 64
                    cpus: "0.5"
                    memory: 256M

    proxy:
        init: true
        image: varnish:8-alpine
        restart: unless-stopped
        volumes:
            - ./varnish.vcl:/etc/varnish/default.vcl:ro
        cap_drop:
            - ALL
        depends_on:
            server:
                condition: service_healthy
        environment:
            VARNISH_SIZE: 128m
        security_opt:
            - no-new-privileges=true
        healthcheck:
            test: wget -O - http://localhost/
            retries: 3
            timeout: 5s
            start_period: 30s
        deploy:
            resources:
                limits:
                    pids: 1024
                    cpus: "0.5"
                    memory: 256M
        ports:
            - "${PORT:-80}:80"

    server:
        init: true
        user: "${UID:-1000}:${GID:-1000}"
        image: registry.florian-dev.fr:443/floriantrayon/simple-file-storage:${VERSION:-latest}
        restart: unless-stopped
        command: bash -c "npm run db:migrate || true; npm run start"
        volumes:
            - ./logs:/usr/src/app/logs
            - ./files:/usr/src/app/public/files
        cap_drop:
            - ALL
        env_file:
            - .env
        environment:
            PORT: 3000
        depends_on:
            database:
                condition: service_healthy
        security_opt:
            - no-new-privileges=true
        healthcheck:
            test: wget -O - http://localhost:3000/
            retries: 3
            timeout: 5s
            start_period: 30s
        deploy:
            resources:
                limits:
                    pids: 64
                    cpus: "1"
                    memory: 512M
        build:
            target: production
            context: .
            dockerfile: ./docker/Dockerfile

volumes:
    mariadb_data:
